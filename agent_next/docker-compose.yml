version: '3.8'

services:
  # 1. MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: agent_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}  # 从.env读取
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"  # 本地开发可映射，生产环境建议移除
    volumes:
      - mysql_data:/var/lib/mysql  # 数据持久化
      - ./config/crate_sql.sql:/docker-entrypoint-initdb.d/init.sql  # 自动执行初始化SQL
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. ChromaDB向量数据库服务
  chroma:
    image: chromadb/chroma:latest
    container_name: agent_chroma
    restart: always
    environment:
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.token_authn.TokenAuthServerProvider
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_AUTH_TOKEN}  # 从.env读取
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: 8000
    ports:
      - "8100:8000"  # 映射到主机8100端口
    volumes:
      - chroma_data:/chroma/chroma  # 数据持久化

  # 3. Python AI Agent应用服务
  web:
    build: .
    container_name: agent_web
    restart: always
    depends_on:
      mysql:
        condition: service_healthy  # 等MySQL健康检查通过再启动
      chroma:
        condition: service_started
    environment:
      # 注入所有敏感配置，从.env读取
      MYSQL_HOST: mysql  # 容器间通信直接用服务名
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      CHROMA_HOST: chroma  # 容器间通信直接用服务名
      CHROMA_PORT: 8000
      CHROMA_AUTH_TOKEN: ${CHROMA_AUTH_TOKEN}
    ports:
      - "8000:8000"  # 映射到主机8000端口
    volumes:
      - ./logs:/app/logs  # 日志持久化到主机
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# 数据卷定义（持久化数据，容器删除不丢失）
volumes:
  mysql_data:
  chroma_data: